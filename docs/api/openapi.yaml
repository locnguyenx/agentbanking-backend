  /api/v1/topup:
    post:
      tags:
      - biller-controller (biller-service)
      operationId: topup
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TopupExternalRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
