              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    TransactionQuoteRequest:
      required:
      - amount
      - serviceCode
      - fundingSource
      type: object
      properties:
        serviceCode:
          type: string
          enum: [CASH_WITHDRAWAL, CASH_DEPOSIT, BILL_PAYMENT, DUITNOW_TRANSFER, CASHLESS_PAYMENT, PIN_BASED_PURCHASE, PREPAID_TOPUP, EWALLET_WITHDRAWAL, EWALLET_TOPUP, ESSP_PURCHASE, PIN_PURCHASE, RETAIL_SALE, HYBRID_CASHBACK, BALANCE_INQUIRY, JOMPAY, ASTRO_RPN, TM_RPN, CELCOM_TOPUP, M1_TOPUP]
          description: Service code for the transaction. Legacy codes (JOMPAY, ASTRO_RPN, TM_RPN, CELCOM_TOPUP, M1_TOPUP) are mapped to canonical types.
        amount:
          type: string
        agentId:
          type: string
        fundingSource:
          type: string
          enum: [CARD_EMV, CASH, DUITNOW_MOBILE, DUITNOW_MYKAD, DUITNOW_BRN, MYKAD_BIOMETRIC, DUITNOW_QR]
        billerRouting:
          type: string
          enum: [ON_US, OFF_US]

    TransactionQuoteResponse:
      required:
      - amount
      - fee
      - commission
      - total
      - quoteId
      type: object
      properties:
        quoteId:
          type: string
        amount:
          type: string
        fee:
          type: string
        total:
          type: string
        commission:
          type: string

    ReversalRequest:
      required:
      - amount
      - originalReference
      - originalTransactionId
      type: object
      properties:
        originalTransactionId:
          type: string
          format: uuid
        originalReference:
          type: string
        amount:
          type: string
    DuitNowRequest:
      required:
      - amount
      - internalTransactionId
      - proxyType
      - proxyValue
      type: object
      properties:
        internalTransactionId:
          type: string
          format: uuid
        proxyType:
          type: string
        proxyValue:
          type: string
        amount:
          type: string
    BalanceInquiryRequest:
      required:
      - encryptedCardData
      - pinBlock
      type: object
      properties:
        encryptedCardData:
          type: string
        pinBlock:
          type: string
    CardAuthRequest:
      required:
      - amount
      - internalTransactionId
      - pan
      type: object
      properties:
        internalTransactionId:
          type: string
          format: uuid
        pan:
          type: string
        amount:
          type: string
    RetailSaleCommand:
      type: object
      properties:
        merchantId:
          type: string
          format: uuid
        amount:
          type: string
        cardData:
          type: string
        pinBlock:
          type: string
        idempotencyKey:
          type: string
    RetailSaleResponse:
      type: object
      properties:
        status:
          type: string
        transactionId:
          type: string
        amount:
          type: string
        mdrAmount:
          type: string
        netToMerchant:
          type: string
    PinPurchaseCommand:
      type: object
      properties:
        agentId:
          type: string
          format: uuid
        productCode:
          type: string
        amount:
          type: string
        idempotencyKey:
          type: string
    PinPurchaseResponse:
      type: object
      properties:
        status:
          type: string
        transactionId:
          type: string
        pinCode:
          type: string
        commission:
          type: string
        timestamp:
          type: string
    CashBackCommand:
      type: object
      properties:
        merchantId:
          type: string
          format: uuid
        cashBackAmount:
          type: string
        cardData:
          type: string
        pinBlock:
          type: string
        idempotencyKey:
          type: string
    CashBackResponse:
      type: object
      properties:
        status:
          type: string
        transactionId:
          type: string
        cashBackAmount:
          type: string
        commission:
          type: string
    # ============================================================
    # EXTERNAL API REQUEST SCHEMAS
    # These are what external consumers should send
    # ============================================================
    
    # Withdrawal - External API Contract
    WithdrawalExternalRequest:
      required:
      - amount
      - currency
      - idempotencyKey
      - customerCard
      - customerPin
      type: object
      properties:
        amount:
          type: string
          description: Transaction amount in MYR
          minimum: 0.01
        currency:
          type: string
          enum: [MYR]
          default: MYR
        idempotencyKey:
          type: string
          format: uuid
          description: Unique key to prevent duplicate transactions
        customerCard:
          type: string
          description: Customer card number (PAN)
          pattern: '^[0-9]{13,19}$'
        customerPin:
          type: string
          description: Customer PIN (4-6 digits)
          pattern: '^[0-9]{4,6}$'
        location:
          $ref: '#/components/schemas/GeoLocation'
    
    # Deposit - External API Contract
    DepositExternalRequest:
      required:
      - amount
      - currency
      - idempotencyKey
      - customerAccount
      type: object
      properties:
        amount:
          type: string
          description: Transaction amount in MYR
          minimum: 0.01
        currency:
          type: string
          enum: [MYR]
          default: MYR
        idempotencyKey:
          type: string
          format: uuid
          description: Unique key to prevent duplicate transactions
        customerAccount:
          type: string
          description: Customer account number
          minLength: 10
          maxLength: 20
        customerName:
          type: string
          description: Customer full name
          maxLength: 100
        location:
          $ref: '#/components/schemas/GeoLocation'
    
    # Top-up - External API Contract
    TopupExternalRequest:
      required:
      - telco
      - phoneNumber
      - amount
      - currency
      - idempotencyKey
      type: object
      properties:
        telco:
          type: string
          enum: [CELCOM, M1, UMOBILE, MAXIS, DIGI]
          description: Telco provider
        phoneNumber:
          type: string
          description: Mobile number (MSISDN format)
          pattern: '^60[0-9]{8,9}$'
        amount:
          type: string
          description: Top-up amount in MYR
          minimum: 1
          maximum: 500
        currency:
          type: string
          enum: [MYR]
          default: MYR
        idempotencyKey:
          type: string
          format: uuid
    
    # Bill Payment - External API Contract
    BillPayExternalRequest:
      required:
      - billerCode
      - ref1
      - amount
      - currency
      - idempotencyKey
      type: object
      properties:
        billerCode:
          type: string
          description: Biller code (4 digits)
          pattern: '^[0-9]{4}$'
        ref1:
          type: string
          description: Reference 1 (bill account number)
          minLength: 5
          maxLength: 20
        ref2:
          type: string
          description: Reference 2 (optional)
          maxLength: 20
        amount:
          type: string
          description: Payment amount in MYR
          minimum: 0.01
        currency:
          type: string
          enum: [MYR]
          default: MYR
        idempotencyKey:
          type: string
          format: uuid
        customerMobile:
          type: string
          description: Customer mobile number

    # JomPay - External API Contract
    JomPayExternalRequest:
      required:
      - billerCode
      - ref1
      - amount
      - currency
      - idempotencyKey
      type: object
      properties:
        billerCode:
          type: string
          description: JomPay biller code
          pattern: '^[0-9]{4}$'
        ref1:
          type: string
          description: JomPay reference 1 (bill account)
          minLength: 10
          maxLength: 19
        ref2:
          type: string
          description: JomPay reference 2 (optional)
          maxLength: 12
        amount:
          type: string
          description: Payment amount in MYR
          minimum: 0.01
        currency:
          type: string
          enum: [MYR]
          default: MYR
        idempotencyKey:
          type: string
          format: uuid
        customerMobile:
          type: string

    # E-wallet Withdraw - External API Contract
    EWalletWithdrawExternalRequest:
      required:
      - walletProvider
      - walletAccountId
      - amount
      - currency
      - idempotencyKey
      type: object
      properties:
        walletProvider:
          type: string
          enum: [SARAWAK_PAY, SARAWAK_TOPUP]
          description: E-wallet provider
        walletAccountId:
          type: string
          description: E-wallet account ID
          minLength: 5
          maxLength: 20
        amount:
          type: string
          description: Withdrawal amount in MYR
          minimum: 1
        currency:
          type: string
          enum: [MYR]
          default: MYR
        idempotencyKey:
          type: string
          format: uuid
        customerCard:
          type: string
          description: Customer card for card-based withdrawal
        customerPin:
          type: string
    
    # E-wallet Topup - External API Contract
    EWalletTopupExternalRequest:
      required:
      - walletProvider
      - walletAccountId
      - amount
      - currency
      - idempotencyKey
      type: object
      properties:
        walletProvider:
          type: string
          enum: [SARAWAK_PAY, SARAWAK_TOPUP]
        walletAccountId:
          type: string
        amount:
          type: string
        currency:
          type: string
          enum: [MYR]
        idempotencyKey:
          type: string
          format: uuid

    # DuitNow Transfer - External API Contract
    DuitNowExternalRequest:
      required:
      - amount
      - currency
      - idempotencyKey
      - proxyType
      - proxyValue
      type: object
      properties:
        amount:
          type: string
        currency:
          type: string
          enum: [MYR]
        idempotencyKey:
          type: string
          format: uuid
        proxyType:
          type: string
          enum: [IC, PHONE, EMAIL, TGAN]
        proxyValue:
          type: string
        recipientName:
          type: string
    
    # ESSP Purchase - External API Contract
    EsspExternalRequest:
      required:
      - productCode
      - amount
      - currency
      - idempotencyKey
      type: object
      properties:
        productCode:
          type: string
        amount:
          type: string
        currency:
          type: string
          enum: [MYR]
        idempotencyKey:
          type: string
          format: uuid
        customerMobile:
          type: string
    
    # Retail Sale - External API Contract
    RetailSaleExternalRequest:
      required:
      - merchantId
      - amount
      - idempotencyKey
      type: object
      properties:
        merchantId:
          type: string
          format: uuid
        amount:
          type: string
        cardData:
          type: string
        pinBlock:
          type: string
        idempotencyKey:
          type: string
          format: uuid
    
    # Retail PIN Purchase - External API Contract
    RetailPinPurchaseExternalRequest:
      required:
      - productCode
      - amount
      - idempotencyKey
      type: object
      properties:
        productCode:
          type: string
        amount:
          type: string
        idempotencyKey:
          type: string
          format: uuid
    
    # Retail Cashback - External API Contract
    RetailCashbackExternalRequest:
      required:
      - merchantId
      - cashBackAmount
      - idempotencyKey
      type: object
      properties:
        merchantId:
          type: string
          format: uuid
        cashBackAmount:
          type: string
        cardData:
          type: string
        pinBlock:
          type: string
        idempotencyKey:
          type: string
          format: uuid
    
    # MyKad Verify Request
    MyKadVerifyRequest:
      required:
      - mykadNumber
      type: object
      properties:
        mykadNumber:
          type: string
          description: MyKad number (12 digits)
          pattern: '^[0-9]{12}$'
        name:
          type: string
          description: Full name from MyKad
        dateOfBirth:
          type: string
          format: date
        address:
          type: string
    
    # Application Submit Request
    ApplicationSubmitRequest:
      required:
      - agentCode
      - businessName
      - tier
      - mykadNumber
      - phoneNumber
      - merchantGpsLat
      - merchantGpsLng
      type: object
      properties:
        agentCode:
          type: string
          description: Unique agent code
        businessName:
          type: string
        tier:
          type: string
          enum: [MICRO, STANDARD, PREMIER]
        mykadNumber:
          type: string
        phoneNumber:
          type: string
        merchantGpsLat:
          type: number
        merchantGpsLng:
          type: number
        email:
          type: string
          format: email
        address:
          type: string
    
    # Application Submit Response
    ApplicationSubmitResponse:
      type: object
      properties:
        applicationId:
          type: string
          format: uuid
        status:
          type: string
          enum: [SUBMITTED, PENDING_REVIEW, APPROVED, REJECTED]
        message:
          type: string
        submittedAt:
          type: string
          format: date-time
    
    # Balance Inquiry - External API Contract
    BalanceInquiryExternalRequest:
      required:
      - encryptedCardData
      - pinBlock
      type: object
      properties:
        encryptedCardData:
          type: string
        pinBlock:
          type: string
    
    # Create Agent Request
    CreateAgentExternalRequest:
      required:
      - agentCode
      - businessName
      - tier
      - mykadNumber
      - phoneNumber
      - merchantGpsLat
      - merchantGpsLng
      type: object
      properties:
        agentCode:
          type: string
          description: Unique agent code
          pattern: '^AGT-[0-9]{3}$'
        businessName:
          type: string
          description: Business name
          maxLength: 200
        tier:
          type: string
          enum: [MICRO, STANDARD, PREMIER]
          description: Agent tier level
        mykadNumber:
          type: string
          description: MyKad number (NRIC)
          pattern: '^[0-9]{12}$'
        phoneNumber:
          type: string
          description: Contact number
          pattern: '^60[0-9]{8,9}$'
        merchantGpsLat:
          type: number
          description: Merchant GPS latitude
          minimum: -90
          maximum: 90
        merchantGpsLng:
          type: number
          description: Merchant GPS longitude
          minimum: -180
          maximum: 180
        email:
          type: string
          format: email
        address:
          type: string
          maxLength: 500
    
    # Update Agent Request
    UpdateAgentRequest:
      required:
      - businessName
      - merchantGpsLat
      - merchantGpsLng
      - phoneNumber
      - tier
      type: object
      properties:
        businessName:
          type: string
          description: Business name
          maxLength: 200
        tier:
          type: string
          enum: [MICRO, STANDARD, PREMIER]
          description: Agent tier level
        merchantGpsLat:
          type: number
          description: Merchant GPS latitude
          minimum: -90
          maximum: 90
        merchantGpsLng:
          type: number
          description: Merchant GPS longitude
          minimum: -180
          maximum: 180
        phoneNumber:
          type: string
          description: Contact number
          pattern: '^60[0-9]{8,9}$'
        email:
          type: string
          format: email
        address:
          type: string
          maxLength: 500
        status:
          type: string
          enum: [ACTIVE, INACTIVE, SUSPENDED]
    
    # Fee Config Request
    FeeConfigRequest:
      required:
      - agentTier
      - transactionType
      - feeType
      - currency
      - effectiveFrom
      type: object
      properties:
        agentTier:
          type: string
          enum: [MICRO, STANDARD, PREMIER]
        transactionType:
          type: string
          enum: [CASH_WITHDRAWAL, CASH_DEPOSIT, BALANCE_INQUIRY, DUITNOW_TRANSFER, BILL_PAYMENT, JOMPAY, ASTRO_RPN, TM_RPN, EPF_PAYMENT, PREPAID_TOPUP, CELCOM_TOPUP, M1_TOPUP, SARAWAK_PAY_WITHDRAWAL, SARAWAK_PAY_TOPUP, ESSP_PURCHASE, PIN_PURCHASE, CASHLESS_PAYMENT, PIN_BASED_PURCHASE, EWALLET_WITHDRAWAL, EWALLET_TOPUP, RETAIL_SALE, HYBRID_CASHBACK]
          description: Transaction type. JOMPAY, ASTRO_RPN, TM_RPN map to BILL_PAYMENT. CELCOM_TOPUP, M1_TOPUP map to PREPAID_TOPUP.
        feeType:
          type: string
          enum: [FIXED, PERCENTAGE]
        feeAmount:
          type: string
        percentage:
          type: string
        minFee:
          type: string
        maxFee:
          type: string
        currency:
          type: string
          enum: [MYR]
        effectiveFrom:
          type: string
          format: date-time
        effectiveTo:
          type: string
          format: date-time
    
    # Discrepancy Maker Action Request
    DiscrepancyMakerActionRequest:
      required:
      - action
      - notes
      type: object
      properties:
        action:
          type: string
          enum: [PROPOSE, ESCALATE]
        notes:
          type: string
        adjustmentAmount:
          type: string

    # Discrepancy Checker Action Request
    DiscrepancyCheckerActionRequest:
      required:
      - action
      - notes
      type: object
      properties:
        action:
          type: string
          enum: [APPROVE, REJECT]
        notes:
          type: string
    
    # Geo Location
    GeoLocation:
      required:
      - latitude
      - longitude
      type: object
      properties:
        latitude:
          type: number
          minimum: -90
          maximum: 90
        longitude:
          type: number
          minimum: -180
          maximum: 180
    
    # ============================================================
    # RESPONSE SCHEMAS
    # ============================================================
    
    # Transaction Success Response
    TransactionResponse:
      type: object
      properties:
        status:
          type: string
          enum: [SUCCESS, PENDING, FAILED]
        transactionId:
          type: string
          format: uuid
        amount:
          type: string
        currency:
          type: string
        transactionType:
          type: string
        timestamp:
          type: string
          format: date-time
        message:
          type: string
        reference:
          type: string
    
    # Fee Config Response
    FeeConfigResponse:
      type: object
      properties:
        feeConfigId:
          type: string
          format: uuid
        agentTier:
          type: string
        transactionType:
          type: string
        feeType:
          type: string
        feeAmount:
          type: string
        percentage:
          type: string
        status:
          type: string
          enum: [ACTIVE, INACTIVE, SUSPENDED, PENDING]
        createdAt:
          type: string
          description: ISO-8601 date-time
        updatedAt:
          type: string
          description: ISO-8601 date-time
    
    # KYC Verify Response
    KycVerifyResponse:
      type: object
      properties:
        verificationId:
          type: string
          format: uuid
        status:
          type: string
          enum: [VERIFIED, PENDING, FAILED, FOUND]
        fullName:
          type: string
        dateOfBirth:
          type: string
        age:
          type: integer
        amlStatus:
          type: string
        message:
          type: string
        kycLevel:
          type: string
          enum: [BASIC, INTERMEDIATE, ADVANCED]
        expiresAt:
          type: string
          format: date-time
    
    # Agent Response
    AgentResponse:
      type: object
      properties:
        agentId:
          type: string
          format: uuid
        agentCode:
          type: string
        businessName:
          type: string
        tier:
          type: string
          enum: [MICRO, STANDARD, PREMIER]
        status:
          type: string
          enum: [ACTIVE, INACTIVE, PENDING, SUSPENDED]
        merchantGpsLat:
          type: number
        merchantGpsLng:
          type: number
        phoneNumber:
          type: string
        email:
          type: string
        address:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string
    
    # Balance Response (for agent balance)
    BalanceResponse:
      type: object
      properties:
        agentId:
          type: string
          format: uuid
        balance:
          type: number
        currency:
          type: string
    
    # Dashboard Response
    DashboardResponse:
      type: object
      properties:
        totalAgents:
          type: integer
        activeAgents:
          type: integer
        totalTransactions:
          type: integer
        totalVolume:
          type: number
        totalCredits:
          type: number
        totalDebits:
          type: number
        pendingKyc:
          type: integer
        successRate:
          type: number
        dailyStats:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
              transactionCount:
                type: integer
              volume:
                type: string
    
    # Transaction List Response
    TransactionListResponse:
      type: object
      properties:
        transactions:
          type: array
          items:
            $ref: '#/components/schemas/TransactionResponse'
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
        totalPages:
          type: integer
    
    # Settlement Response
    SettlementResponse:
      type: object
      properties:
        transactions:
          type: array
          items:
            type: object
            additionalProperties: true
        totalDebits:
          type: number
        totalCredits:
          type: number
        totalCommissions:
          type: number
        netAmount:
          type: number
        date:
          type: string
          format: date
    
    # Error Response
    ErrorResponse:
      required:
      - status
      - error
      type: object
      properties:
        status:
          type: string
          enum: [FAILED]
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            action_code:
              type: string
              enum: [DECLINE, RETRY, REVIEW]
            trace_id:
              type: string
              nullable: true
            timestamp:
              type: string
              format: date-time

    # ============================================================
    # TRANSACTION ORCHESTRATOR SCHEMAS (NEW - 2026-04-05)
    # ============================================================

    # Transaction Type Enum
    TransactionType:
      type: string
      enum: [CASH_WITHDRAWAL, CASH_DEPOSIT, BILL_PAYMENT, DUITNOW_TRANSFER, CASHLESS_PAYMENT, PIN_BASED_PURCHASE, PREPAID_TOPUP, EWALLET_WITHDRAWAL, EWALLET_TOPUP, ESSP_PURCHASE, PIN_PURCHASE, RETAIL_SALE, HYBRID_CASHBACK]
      description: Type of transaction to initiate. BILL_PAYMENT includes JOMPAY, ASTRO_RPN, TM_RPN. PREPAID_TOPUP includes CELCOM_TOPUP, M1_TOPUP.

    # Transaction Start Request
    TransactionStartRequest:
      type: object
      required: [transactionType, amount, fundingSource, idempotencyKey]
      properties:
        idempotencyKey:
          type: string
          format: uuid
          description: Unique key to prevent duplicate transactions.
        transactionType:
          $ref: '#/components/schemas/TransactionType'
        agentId:
          type: string
          format: uuid
          description: Unique identifier of the agent
        amount:
          type: number
          format: double
          minimum: 0.01
          description: Transaction amount in MYR
        fundingSource:
          type: string
          enum: [CASH, ACCOUNT, MOBILE]
          description: Source of funds for the transaction.
        pan:
          type: string
          description: Card number (PAN) - required for CASH_WITHDRAWAL
          pattern: '^[0-9]{13,19}$'
        pinBlock:
          type: string
          description: Encrypted PIN block - required for CASH_WITHDRAWAL
        customerCardMasked:
          type: string
          description: Masked card number for display (e.g., 411111******1111)
        destinationAccount:
          type: string
          description: Destination account number - required for CASH_DEPOSIT
        requiresBiometric:
          type: boolean
          default: false
          description: Whether biometric verification is required
        billerCode:
          type: string
          description: Biller code - required for BILL_PAYMENT
        ref1:
          type: string
          description: Reference 1 (bill account number) - required for BILL_PAYMENT
        ref2:
          type: string
          description: Reference 2 (optional) - for BILL_PAYMENT
        proxyType:
          type: string
          enum: [IC, PHONE, EMAIL, TGAN]
          description: DuitNow proxy type - required for DUITNOW_TRANSFER
        proxyValue:
          type: string
          description: DuitNow proxy value - required for DUITNOW_TRANSFER
        customerMykad:
          type: string
          description: Encrypted customer MyKad number
        geofenceLat:
          type: number
          format: double
          description: GPS latitude of transaction location
        geofenceLng:
          type: number
          format: double
          description: GPS longitude of transaction location
        targetBIN:
          type: string
          description: Target bank BIN for routing
        agentTier:
          type: string
          enum: [MICRO, STANDARD, PREMIER]
          description: Agent tier level

    # Transaction Start Response
    TransactionStartResponse:
      type: object
      properties:
        status:
          type: string
          enum: [PENDING]
          description: Initial status of the transaction
        workflowId:
          type: string
          description: Unique workflow identifier for polling status
        pollUrl:
          type: string
          description: URL to poll for transaction status

    # Transaction Status Response
    TransactionStatusResponse:
      type: object
      properties:
        status:
          type: string
          enum: [PENDING, RUNNING, COMPLETED, FAILED, COMPENSATING, UNKNOWN]
          description: Current workflow status
        workflowId:
          type: string
          description: Workflow identifier
        transactionType:
          type: string
          nullable: true
          description: Type of transaction
        amount:
          type: number
          format: double
          description: Transaction amount
        customerFee:
          type: number
          format: double
          description: Fee charged to customer
        referenceNumber:
          type: string
          nullable: true
          description: External reference number from switch/biller
        errorCode:
          type: string
          nullable: true
          description: Error code if transaction failed
        errorMessage:
          type: string
          nullable: true
          description: Human-readable error message
        actionCode:
          type: string
          enum: [DECLINE, RETRY, REVIEW]
          nullable: true
          description: Recommended action for failed transactions
        completedAt:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when transaction completed
        agentTier:
          type: string
          nullable: true
        billerCode:
          type: string
          nullable: true
        customerCardMasked:
          type: string
          nullable: true
        destinationAccount:
          type: string
          nullable: true
        errorDetails:
          type: object
          nullable: true
        geofenceLat:
          type: number
          format: double
          nullable: true
        geofenceLng:
          type: number
          format: double
          nullable: true
        pendingReason:
          type: string
          nullable: true
        ref1:
          type: string
          nullable: true
        ref2:
          type: string
          nullable: true
        targetBin:
          type: string
          nullable: true

    # Force Resolve Request
    ForceResolveRequest:
      required:
      - action
      - reason
      type: object
      properties:
        action:
          type: string
          enum: [COMMIT, REVERSE]
          description: Action to take - COMMIT to complete, REVERSE to cancel
        reason:
          type: string
          description: Reason for force resolve

    # Maker Proposal Request
    MakerProposalRequest:
      required:
      - action
      type: object
      properties:
        action:
          type: string
          enum: [COMMIT, ROLLBACK, ESCALATE]
          description: Proposed action for the transaction
        reasonCode:
          type: string
          description: Reason code for the proposal
        reason:
          type: string
          description: Detailed reason for the proposal
        evidenceUrl:
          type: string
          description: URL to supporting evidence

    # Checker Action Request
    CheckerActionRequest:
      required:
      - reason
      type: object
      properties:
        reason:
          type: string
          description: Reason for approve/reject action

    # Resolution Response
    ResolutionResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        workflowId:
          type: string
          format: uuid
        transactionId:
          type: string
          format: uuid
        proposedAction:
          type: string
          enum: [COMMIT, ROLLBACK, ESCALATE]
        reasonCode:
          type: string
        reason:
          type: string
        evidenceUrl:
          type: string
        status:
          type: string
          enum: [PENDING_MAKER, PENDING_CHECKER, APPROVED, REJECTED]
        makerUserId:
          type: string
        makerCreatedAt:
          type: string
          format: date-time
        checkerUserId:
          type: string
        checkerAction:
          type: string
        checkerReason:
          type: string
        checkerCompletedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # Token Management
    TokenRequest:
      required:
      - username
      - password
      type: object
      properties:
        username:
          type: string
        password:
          type: string
        grantType:
          type: string
          enum: [password, refresh_token]
          default: password
          minLength: 8
          maxLength: 64
    TokenResponse:
      required:
      - access_token
      - refresh_token
      - expires_in
      - token_type
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        expires_in:
          type: integer
          format: int32
          description: Token expiry in seconds
        token_type:
          type: string
          enum: [Bearer]
    MyProfileResponse:
      type: object
      properties:
        userId:
          type: string
          nullable: true
        username:
          type: string
        email:
          type: string
        fullName:
          type: string
        userType:
          type: string
          enum: [INTERNAL, EXTERNAL]
        status:
          type: string
        agentId:
          type: string
          nullable: true
          description: The linked agent ID for external users
        mustChangePassword:
          type: boolean
        permissions:
          type: array
          items:
            type: string

    RefreshTokenRequest:
      required:
      - refresh_token
      type: object
      properties:
        refresh_token:
          type: string
    RevokeTokenRequest:
      type: object
      properties:
        token:
          type: string
          description: Optional. If not provided, revokes all sessions for the current user.

    # Password Management
    ForgotPasswordRequest:
      required:
      - username
      type: object
      properties:
        username:
          type: string
    ForgotPasswordResponse:
      type: object
      properties:
        message:
          type: string
    ResetPasswordRequest:
      required:
      - username
      - otp
      - newPassword
      type: object
      properties:
        username:
          type: string
        otp:
          type: string
          minLength: 6
          maxLength: 6
        newPassword:
          type: string
          minLength: 8
          maxLength: 64
    ResetPasswordResponse:
      type: object
      properties:
        message:
