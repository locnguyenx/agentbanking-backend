      - e-wallet-controller (biller-service)
      operationId: withdrawal
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EWalletWithdrawExternalRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
