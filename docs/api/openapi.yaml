openapi: 3.0.3
info:
  version: 1.0.0
  title: Agent Banking Platform API
  description: Aggregated API from all microservices
  contact:
    name: Agent Banking Platform Team
servers:
- description: Gateway
  url: http://localhost:8080
- description: Production
  url: https://api.agentbanking.example.com
- description: Sandbox
  url: https://sandbox.agentbanking.example.com
paths:
  /api/v1/transactions/quote:
    post:
      tags:
      - transaction-controller (rules-service)
      operationId: getTransactionQuote
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransactionQuoteRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionQuoteResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/transactions:
    post:
      tags:
      - orchestrator-controller (orchestrator-service)
      operationId: startTransaction
      summary: Start a new transaction via Temporal SAGA orchestration
      description: Initiates a transaction workflow (withdrawal, deposit, bill payment, or DuitNow transfer) using Temporal durable execution. Returns a workflow ID for polling status.
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransactionStartRequest'
        required: true
      responses:
        '202':
          description: Transaction accepted for processing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionStartResponse'
        '200':
          description: Transaction completed immediately
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionStartResponse'
        '400':
          description: Bad Request - Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/transactions/{workflowId}/status:
    get:
      tags:
      - orchestrator-controller (orchestrator-service)
      operationId: getTransactionStatus
      summary: Get transaction workflow status
      description: Poll the status of a previously started transaction workflow.
      security:
        - bearerAuth: []
      parameters:
      - name: workflowId
        in: path
        required: true
        schema:
          type: string
        description: The workflow ID returned from the start transaction response
      responses:
        '200':
          description: Transaction status retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionStatusResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not Found - Workflow not found
  /api/v1/transactions/{workflowId}/force-resolve:
    post:
      tags:
      - orchestrator-controller (orchestrator-service)
      operationId: forceResolveTransaction
      summary: Force resolve a stuck transaction workflow
      description: Admin operation to manually resolve a stuck or failed workflow. Requires admin credentials.
      security:
        - bearerAuth: []
      parameters:
      - name: workflowId
        in: path
        required: true
        schema:
          type: string
        description: The workflow ID to force resolve
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForceResolveRequest'
        required: true
      responses:
        '200':
          description: Force resolve signal sent successfully
          content:
            application/json:
              schema:
                type: object
                required:
                  - action
                properties:
                  action:
                    type: string
                    enum: [MANUAL_RETRY, MANUAL_CANCEL, MANUAL_COMPLETE]
                  reason:
                    type: string
                  status:
                    type: string
                    example: SUCCESS
                  message:
                    type: string
        '400':
          description: Bad Request - Invalid action or workflow not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - Admin access required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/transfer/proxy/enquiry:
    get:
      tags:
      - switch-controller (biller-service)
      operationId: proxyEnquiry
      security:
