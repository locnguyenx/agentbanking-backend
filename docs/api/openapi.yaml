          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '402':
          description: Payment Required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/ewallet/topup:
    post:
      tags:
      - e-wallet-controller (biller-service)
      operationId: topup_1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EWalletTopupExternalRequest'
              additionalProperties:
                type: object
        required: true
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                type: object
                additionalProperties:
                  type: object
  /api/v1/essp/purchase:
