services:
  # ==================== Infrastructure ====================
  
  # PostgreSQL for Rules Service
  postgres-rules:
    image: postgres:16-alpine
    profiles: [infra, backend, all]
    environment:
      POSTGRES_DB: rules_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata-rules:/var/lib/postgresql/data
    mem_limit: 256m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # PostgreSQL for Ledger Service
  postgres-ledger:
    image: postgres:16-alpine
    profiles: [infra, backend, all]
    environment:
      POSTGRES_DB: ledger_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - pgdata-ledger:/var/lib/postgresql/data
    mem_limit: 256m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # PostgreSQL for Onboarding Service
  postgres-onboarding:
    image: postgres:16-alpine
    profiles: [infra, backend, all]
    environment:
      POSTGRES_DB: onboarding_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - pgdata-onboarding:/var/lib/postgresql/data
    mem_limit: 256m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # PostgreSQL for Switch Adapter Service
  postgres-switch:
    image: postgres:16-alpine
    profiles: [infra, backend, all]
    environment:
      POSTGRES_DB: switch_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5436:5432"
    volumes:
      - pgdata-switch:/var/lib/postgresql/data
    mem_limit: 256m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # PostgreSQL for Biller Service
  postgres-biller:
    image: postgres:16-alpine
    profiles: [infra, backend, all]
    environment:
      POSTGRES_DB: biller_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5437:5432"
    volumes:
      - pgdata-biller:/var/lib/postgresql/data
    mem_limit: 256m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # PostgreSQL for Orchestrator Service
  postgres-orchestrator:
    image: postgres:16-alpine
    profiles: [infra, backend, all]
    environment:
      POSTGRES_DB: orchestrator_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5438:5432"
    volumes:
      - pgdata-orchestrator:/var/lib/postgresql/data
    mem_limit: 256m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # PostgreSQL for Auth/IAM Service
  postgres-auth:
    image: postgres:16-alpine
    profiles: [infra, backend, all]
    environment:
      POSTGRES_DB: authdb
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_password
    ports:
      - "5439:5432"
    volumes:
      - pgdata-auth:/var/lib/postgresql/data
    mem_limit: 256m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d authdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  # PostgreSQL for Audit Service
  postgres-audit:
    image: postgres:16-alpine
    profiles: [infra, backend, all]
    environment:
      POSTGRES_DB: auditdb
      POSTGRES_USER: audit_user
      POSTGRES_PASSWORD: audit_password
    ports:
      - "5440:5432"
    volumes:
      - postgres-audit-data:/var/lib/postgresql/data
    mem_limit: 256m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U audit_user -d auditdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis for caching and idempotency
  redis:
    image: redis:7-alpine
    profiles: [infra, backend, all]
    ports:
      - "6379:6379"
    mem_limit: 128m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Kafka (using KRaft mode, no Zookeeper)
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    profiles: [infra, backend, all]
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    mem_limit: 512m
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10

  # ==================== Application Services ====================

  # Mock Server (downstream simulators)
  mock-server:
    build:
      context: .
      dockerfile: ./mock-server/Dockerfile
    profiles: [mocks, backend, all]
    ports:
      - "8090:8090"
    mem_limit: 256m
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8090/ || true"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Rules Service
  rules-service:
    build:
      context: .
      dockerfile: ./services/rules-service/Dockerfile
    profiles: [backend, all]
    ports:
      - "8081:8081"
    mem_limit: 384m
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-rules:5432/rules_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_DATA_REDIS_HOST: redis
    depends_on:
      postgres-rules:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8081/internal/fees/CASH_WITHDRAWAL/MICRO || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Ledger Service
  ledger-service:
    build:
      context: .
      dockerfile: ./services/ledger-service/Dockerfile
    profiles: [backend, all]
    ports:
      - "18082:8082"
    mem_limit: 384m
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-ledger:5432/ledger_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_DATA_REDIS_HOST: redis
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      RULES_SERVICE_URL: http://rules-service:8081
      SWITCH_ADAPTER_SERVICE_URL: http://switch-adapter-service:8084
    depends_on:
      postgres-ledger:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      rules-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8082/ || true"]
      interval: 10s
      timeout: 5s
      retries: 15

  # Onboarding Service
  onboarding-service:
    build:
      context: .
      dockerfile: ./services/onboarding-service/Dockerfile
    profiles: [backend, all]
    ports:
      - "8083:8083"
    mem_limit: 384m
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-onboarding:5432/onboarding_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SERVICES_LEDGER-SERVICE_URL: http://ledger-service:8082
      AUTH_SERVICE_URL: http://auth-iam-service:8087
      AML-SCREENING_URL: http://mock-server:8090
    depends_on:
      postgres-onboarding:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8083/ || true"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Switch Adapter Service
  switch-adapter-service:
    build:
      context: .
      dockerfile: ./services/switch-adapter-service/Dockerfile
    profiles: [backend, all]
    ports:
      - "8084:8084"
    mem_limit: 384m
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-switch:5432/switch_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      MOCK_SERVER_URL: http://mock-server:8090
      SPRING_MAIN_ALLOW_BEAN_DEFINITION_OVERRIDING: "true"
    depends_on:
      postgres-switch:
        condition: service_healthy
      mock-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8084/ || true"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Biller Service
  biller-service:
    build:
      context: .
      dockerfile: ./services/biller-service/Dockerfile
    profiles: [backend, all]
    ports:
      - "8085:8085"
    mem_limit: 384m
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-biller:5432/biller_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      MOCK_SERVER_URL: http://mock-server:8090
    depends_on:
      postgres-biller:
        condition: service_healthy
      mock-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8085/ || true"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Orchestrator Service (Transaction Saga)
  orchestrator-service:
    build:
      context: .
      dockerfile: ./services/orchestrator-service/Dockerfile
    profiles: [backend, all]
    ports:
      - "8086:8086"
    mem_limit: 384m
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-orchestrator:5432/orchestrator_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_DATA_REDIS_HOST: redis
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      TEMPORAL_ADDRESS: temporal:7233
      LEDGER_SERVICE_URL: http://ledger-service:8082
      RULES_SERVICE_URL: http://rules-service:8081
      SWITCH_ADAPTER_SERVICE_URL: http://switch-adapter-service:8084
      BILLER_SERVICE_URL: http://biller-service:8085
      CBS_CONNECTOR_URL: http://mock-server:8090
    depends_on:
      postgres-orchestrator:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      temporal:
        condition: service_healthy
      biller-service:
        condition: service_healthy
      ledger-service:
        condition: service_healthy
      rules-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8086/ || true"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Auth/IAM Service (Authentication & Identity Management)
  auth-iam-service:
    build:
      context: .
      dockerfile: ./services/auth-iam-service/Dockerfile
    profiles: [backend, all]
    ports:
      - "8087:8087"
    mem_limit: 384m
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-auth:5432/authdb
      SPRING_DATASOURCE_USERNAME: auth_user
      SPRING_DATASOURCE_PASSWORD: auth_password
      SPRING_DATA_REDIS_HOST: redis
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET: your-super-secret-jwt-key-change-in-production-minimum-32-chars-long
    depends_on:
      postgres-auth:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8087 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Audit Service (Audit Log Aggregation)
  audit-service:
    build:
      context: .
      dockerfile: ./services/audit-service/Dockerfile
    profiles: [backend, all]
    ports:
      - "8088:8088"
    mem_limit: 256m
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-audit:5432/auditdb
      SPRING_DATASOURCE_USERNAME: audit_user
      SPRING_DATASOURCE_PASSWORD: audit_password
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres-audit:
        condition: service_healthy
      kafka:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8088/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # API Gateway
  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    profiles: [gateway, all]
    ports:
      - "8080:8080"
    mem_limit: 256m
    environment:
      JWT_SECRET: your-super-secret-jwt-key-change-in-production-minimum-32-chars-long
      SPRING_DATA_REDIS_HOST: redis
    depends_on:
      auth-iam-service:
        condition: service_healthy
      rules-service:
        condition: service_healthy
      ledger-service:
        condition: service_healthy
      onboarding-service:
        condition: service_healthy
      switch-adapter-service:
        condition: service_healthy
      biller-service:
        condition: service_healthy
      orchestrator-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/ || true"]
      interval: 10s
      timeout: 5s
      retries: 15

  # Backoffice UI
  backoffice:
    build:
      context: ./backoffice
      dockerfile: Dockerfile
    profiles: [frontend, all]
    ports:
      - "3000:3000"
    mem_limit: 128m
    depends_on:
      gateway:
        condition: service_healthy

  temporal:
    image: temporalio/auto-setup:latest
    profiles: [backend, all]
    ports:
      - "7233:7233"
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_SEEDS=temporal-postgres
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
    depends_on:
      temporal-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep temporal-server > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  temporal-postgres:
    image: postgres:16
    environment:
      - POSTGRES_USER=temporal
      - POSTGRES_PASSWORD=temporal
      - POSTGRES_DB=temporal
    volumes:
      - temporal-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 5s
      retries: 5

  temporal-ui:
    image: temporalio/ui:latest
    profiles: [backend, all]
    ports:
      - "8082:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      - temporal

volumes:
  pgdata-rules:
  pgdata-ledger:
  pgdata-onboarding:
  pgdata-switch:
  pgdata-biller:
  pgdata-orchestrator:
  pgdata-auth:
  postgres-audit-data:
  temporal-postgres-data:
