spring:
  datasource:
    url: jdbc:postgresql://postgres-ledger:5432/ledger_db
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true
    locations: classpath:db/migration/ledger
    validate-on-migrate: false
    ignore-missing-migrations: true
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:redis}
      port: 6379
      timeout: 2000
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.value.default.type: com.agentbanking.common.event.AgentCreatedEvent
  cloud:
    stream:
      kafka:
        binder:
          brokers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
      bindings:
        agentCreated-in-0:
          destination: agentCreatedIn-in-0
          group: ledger-service
          content-type: application/json

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

rules-service:
  url: ${RULES_SERVICE_URL:http://rules-service:8081}

switch-adapter:
  url: ${SWITCH_ADAPTER_SERVICE_URL:http://switch-adapter-service:8084}

switch-adapter-service:
  url: ${SWITCH_ADAPTER_SERVICE_URL:http://switch-adapter-service:8084}
