spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/ledger_db
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true
    locations: classpath:db/migration/ledger
    validate-on-migrate: false
    ignore-missing-migrations: true
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.type.mapping: >
          transactionEvent:com.agentbanking.ledger.infrastructure.messaging.TransactionEvent,
          reversalEvent:com.agentbanking.ledger.infrastructure.messaging.ReversalEvent

server:
  port: 8082

rules-service:
  url: ${RULES_SERVICE_URL:http://rules-service:8081}

switch-adapter:
  url: ${SWITCH_ADAPTER_SERVICE_URL:http://switch-adapter-service:8084}

switch-adapter-service:
  url: ${SWITCH_ADAPTER_SERVICE_URL:http://switch-adapter-service:8084}
