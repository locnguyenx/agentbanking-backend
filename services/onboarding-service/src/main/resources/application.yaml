spring:
  datasource:
    url: jdbc:postgresql://postgres-onboarding:5432/onboarding_db
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.type.mapping: >
          agentCreatedEvent:com.agentbanking.common.event.AgentCreatedEvent
  cloud:
    stream:
      kafka:
        binder:
          brokers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
      bindings:
        agentCreated-out-0:
          destination: agentCreatedIn-in-0
          content-type: application/json

server:
  port: 8083

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# JWT Configuration for token generation
jwt:
  issuer: http://onboarding-service:8083
  token-expiry: 3600  # 1 hour

aml-screening:
  url: http://localhost:8090

auth:
  service:
    url: http://auth-iam-service:8087
