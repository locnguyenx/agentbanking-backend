spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/onboarding_db
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8083

# JWT Configuration for token generation
jwt:
  issuer: http://onboarding-service:8083
  token-expiry: 3600  # 1 hour

aml-screening:
  url: http://localhost:8090
