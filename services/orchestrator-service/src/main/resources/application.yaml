server:
  port: 8086 

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

spring:
  application:
    name: orchestrator-service
  flyway:
    enabled: false
  temporal:
    namespace: default
    connection:
      target: ${TEMPORAL_ADDRESS:temporal:7233}
    workers-auto-discovery:
      packages:
        - com.agentbanking.orchestrator.infrastructure.temporal.ActivityImpl
        - com.agentbanking.orchestrator.infrastructure.temporal.WorkflowImpl
  cloud:
    openfeign:
      circuitbreaker:
        enabled: true

rules-service:
  url: ${RULES_SERVICE_URL:http://localhost:8081}

ledger-service:
  url: ${LEDGER_SERVICE_URL:http://localhost:8082}

switch-adapter-service:
  url: ${SWITCH_ADAPTER_SERVICE_URL:http://localhost:8083}

biller-service:
  url: ${BILLER_SERVICE_URL:http://localhost:8084}

cbs-connector:
  url: ${CBS_CONNECTOR_URL:http://localhost:8085}

telco-aggregator:
  url: ${TELCO_AGGREGATOR_URL:http://localhost:8091}

ewallet-provider:
  url: ${EWALLET_PROVIDER_URL:http://localhost:8092}

essp-service:
  url: ${ESSP_SERVICE_URL:http://localhost:8093}

pin-inventory:
  url: ${PIN_INVENTORY_URL:http://localhost:8094}

resilience4j:
  circuitbreaker:
    instances:
      rulesService:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
        timeoutDurationSec: 30
        eventConsumerBufferSize: 10
      switchAdapter:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
        timeoutDurationSec: 25
        eventConsumerBufferSize: 10
      telcoAggregator:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
        timeoutDurationSec: 30
        eventConsumerBufferSize: 10
      ewalletProvider:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
        timeoutDurationSec: 30
        eventConsumerBufferSize: 10
      esspService:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
        timeoutDurationSec: 30
        eventConsumerBufferSize: 10
      pinInventory:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
        timeoutDurationSec: 30
        eventConsumerBufferSize: 10
      qrPayment:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
        timeoutDurationSec: 60
        eventConsumerBufferSize: 10
      requestToPay:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
        timeoutDurationSec: 60
        eventConsumerBufferSize: 10
      merchantTransaction:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
        timeoutDurationSec: 30
        eventConsumerBufferSize: 10

logging:
  level:
    com.agentbanking.orchestrator: INFO
    io.temporal: INFO
    io.temporal.worker: INFO
    io.temporal.internal.worker: DEBUG
    org.springframework: INFO
