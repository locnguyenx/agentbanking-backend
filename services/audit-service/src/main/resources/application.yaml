server:
  port: 8088

spring:
  application:
    name: audit-service
  datasource:
    url: jdbc:postgresql://localhost:5432/auditdb
    username: audit_user
    password: audit_password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
  cloud:
    stream:
      kafka:
        binder:
          brokers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
      bindings:
        auditLog-out-0:
          destination: audit-logs
          content-type: application/json
        auditLog-in-0:
          destination: audit-logs
          group: audit-service
          content-type: application/json

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    com.agentbanking.audit: DEBUG

admin:
  services:
    gateway: http://gateway:8080
    rules: http://rules-service:8081
    ledger: http://ledger-service:8082
    onboarding: http://onboarding-service:8083
    switch: http://switch-adapter-service:8084
    biller: http://biller-service:8085
    orchestrator: http://orchestrator-service:8086
    auth: http://auth-iam-service:8087
    audit: http://audit-service:8088
# mock: http://mock-server:8090  # Not a real service - no actuator health endpoint
