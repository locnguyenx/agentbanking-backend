server:
  port: 8087

spring:
  application:
    name: auth-iam-service
  datasource:
    url: jdbc:postgresql://localhost:5432/authdb
    username: auth_user
    password: auth_password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: false
    locations: classpath:db/migration
    baseline-on-migrate: true
  redis:
    host: localhost
    port: 6379
    timeout: 10s
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
  cloud:
    stream:
      kafka:
        binder:
          brokers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
      bindings:
        userCreated-out-0:
          destination: user.lifecycle
          content-type: application/json
        userCreationFailed-out-0:
          destination: user.lifecycle
          content-type: application/json
        passwordResetConfirmed-out-0:
          destination: user.lifecycle
          content-type: application/json
        otpRequested-out-0:
          destination: user.lifecycle
          content-type: application/json
        agentCreated-in-0:
          destination: agent.lifecycle
          group: auth-iam-service
          content-type: application/json

onboarding-service:
  url: ${ONBOARDING_SERVICE_URL:http://onboarding-service:8083}

jwt:
  secret: ${JWT_SECRET:your-super-secret-jwt-key-change-in-production-minimum-32-chars-long}
  access-token-expiration-minutes: 15
  refresh-token-expiration-minutes: 1440

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    com.agentbanking.auth: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE