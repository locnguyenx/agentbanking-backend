server:
  port: 8081

spring:
  application:
    name: auth-iam-service
  datasource:
    url: jdbc:postgresql://localhost:5432/authdb
    username: auth_user
    password: auth_password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  redis:
    host: localhost
    port: 6379
    timeout: 10s
  mail:
    host: smtp.gmail.com
    port: 587
    username: 
    password: 
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://auth.agentbanking.com
          jwk-set-uri: https://auth.agentbanking.com/.well-known/jwks.json

jwt:
  secret: your-super-secret-jwt-key-change-in-production-minimum-32-chars-long
  access-token-expiration-minutes: 15
  refresh-token-expiration-minutes: 1440

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    com.agentbanking.auth: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE