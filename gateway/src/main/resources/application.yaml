server:
  port: 8080
  tomcat:
    max-http-header-size: 32KB
  netty:
    connection:
      max-header-size: 32KB

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    urls:
      - url: /v3/api-docs
        name: All Services
      - url: /docs/auth/v3/api-docs
        name: Auth/IAM Service
      - url: /docs/rules/v3/api-docs
        name: Rules Service
      - url: /docs/ledger/v3/api-docs
        name: Ledger Service
      - url: /docs/onboarding/v3/api-docs
        name: Onboarding Service
      - url: /docs/switch/v3/api-docs
        name: Switch Adapter Service
      - url: /docs/biller/v3/api-docs
        name: Biller Service
      - url: /docs/orchestrator/v3/api-docs
        name: Orchestrator Service

spring:
  application:
    name: api-gateway
  security:
    oauth2:
      resourceserver:
        jwt:
          secret: ${JWT_SECRET:your-super-secret-jwt-key-change-in-production-minimum-32-chars-long}
  cloud:
    gateway:
      routes:
        - id: external-onboarding-verify-mykad-kyc
          uri: ${onboarding-service.url:http://onboarding-service:8083}
          predicates:
            - Path=/api/v1/kyc/verify
          filters:
            - JwtAuth
            - RewritePath=/api/v1/kyc/verify, /internal/verify-mykad

        # Auth/IAM Service (public endpoints - no JWT required)
        - id: auth-bootstrap
          uri: ${auth-service.url:http://auth-iam-service:8087}
          predicates:
            - Path=/auth/users/bootstrap
        - id: auth-token
          uri: ${auth-service.url:http://auth-iam-service:8087}
          predicates:
            - Path=/auth/token
        - id: auth-refresh
          uri: ${auth-service.url:http://auth-iam-service:8087}
          predicates:
            - Path=/auth/refresh
        - id: auth-wellknown
          uri: ${auth-service.url:http://auth-iam-service:8087}
          predicates:
            - Path=/.well-known/jwks.json
        - id: auth-docs
          uri: ${auth-service.url:http://auth-iam-service:8087}
          predicates:
            - Path=/docs/auth/**

        # ============================================================
        # External Auth Token endpoints (public - no JwtAuth required)
        # ============================================================
        - id: external-auth-token
          uri: ${auth-service.url:http://auth-iam-service:8087}
          predicates:
            - Path=/api/v1/auth/token
          filters:
            - RewritePath=/api/v1/auth/token, /auth/token

        - id: external-auth-refresh
          uri: ${auth-service.url:http://auth-iam-service:8087}
          predicates:
            - Path=/api/v1/auth/refresh
          filters:
            - RewritePath=/api/v1/auth/refresh, /auth/refresh

        - id: external-auth-revoke
          uri: ${auth-service.url:http://auth-iam-service:8087}
          predicates:
            - Path=/api/v1/auth/revoke
          filters:
            - JwtAuth
            - RewritePath=/api/v1/auth/revoke, /auth/revoke

        # ============================================================
        # External Password endpoints (forgot/reset public, change protected)
        # ============================================================
        - id: external-auth-password-forgot
          uri: ${auth-service.url:http://auth-iam-service:8087}
          predicates:
            - Path=/api/v1/auth/password/forgot
          filters:
            - RewritePath=/api/v1/auth/password/forgot, /auth/password/forgot

        - id: external-auth-password-reset
          uri: ${auth-service.url:http://auth-iam-service:8087}
          predicates:
            - Path=/api/v1/auth/password/reset
          filters:
            - RewritePath=/api/v1/auth/password/reset, /auth/password/reset

        - id: external-auth-password-change
          uri: ${auth-service.url:http://auth-iam-service:8087}
          predicates:
            - Path=/api/v1/auth/password/change
          filters:
            - JwtAuth
            - RewritePath=/api/v1/auth/password/change, /auth/password/change

        # Agent profile endpoint for external apps
        - id: external-auth-me
          uri: ${auth-service.url:http://auth-iam-service:8087}
          predicates:
            - Path=/api/v1/auth/me
          filters:
            - JwtAuth
            - RewritePath=/api/v1/auth/me, /auth/me

        # ============================================================
        # External Agent User Management endpoints (protected)
        # ============================================================
        - id: external-backoffice-agent-user-status
          uri: ${auth-service.url:http://auth-iam-service:8087}
          predicates:
            - Path=/api/v1/backoffice/agents/*/user-status
          filters:
            - JwtAuth
            - RewritePath=/api/v1/backoffice/agents/(?<agentId>.*)/user-status, /internal/users/agent/${agentId}/status

        - id: external-backoffice-agent-create-user
          uri: ${auth-service.url:http://auth-iam-service:8087}
          predicates:
            - Path=/api/v1/backoffice/agents/*/create-user
          filters:
            - JwtAuth
            - RewritePath=/api/v1/backoffice/agents/(?<agentId>.*)/create-user, /internal/users/agent/${agentId}/create

        # Password endpoints (public)
        - id: auth-password-forgot
          uri: ${auth-service.url:http://auth-iam-service:8087}
          predicates:
            - Path=/auth/password/forgot
        - id: auth-password-reset
          uri: ${auth-service.url:http://auth-iam-service:8087}
          predicates:
            - Path=/auth/password/reset
        - id: auth-password-change
          uri: ${auth-service.url:http://auth-iam-service:8087}
          predicates:
            - Path=/auth/password/change
          filters:
            - JwtAuth
        - id: internal-auth-agent-user
          uri: ${auth-service.url:http://auth-iam-service:8087}
          predicates:
            - Path=/internal/users/agent
          filters:
            - RewritePath=/internal/users/agent, /internal/users/agent
        
        # Auth/IAM Service (protected endpoints - JWT required)
        - id: auth-users-me
          uri: ${auth-service.url:http://auth-iam-service:8087}
          predicates:
            - Path=/api/v1/auth/users/me
          filters:
            - JwtAuth
            - RewritePath=/api/v1/auth/users/me, /auth/users/me
        - id: auth-users
          uri: ${auth-service.url:http://auth-iam-service:8087}
          predicates:
            - Path=/api/v1/auth/users
          filters:
            - JwtAuth
            - RewritePath=/api/v1/auth/users, /auth/users
        - id: auth-roles
          uri: ${auth-service.url:http://auth-iam-service:8087}
          predicates:
            - Path=/auth/roles, /auth/roles/*
          filters:
            - JwtAuth
            - RewritePath=/auth/roles/(?<segment>.*), /auth/roles/${segment}
        - id: auth-permissions
          uri: ${auth-service.url:http://auth-iam-service:8087}
          predicates:
            - Path=/auth/permissions, /auth/permissions/*
          filters:
            - JwtAuth
            - RewritePath=/auth/permissions/(?<segment>.*), /auth/permissions/${segment}
        - id: auth-sessions
          uri: ${auth-service.url:http://auth-iam-service:8087}
          predicates:
            - Path=/auth/sessions, /auth/sessions/*
          filters:
            - JwtAuth
            - RewritePath=/auth/sessions/(?<segment>.*), /auth/sessions/${segment}
        - id: auth-audit
          uri: ${auth-service.url:http://auth-iam-service:8087}
          predicates:
            - Path=/auth/audit/**
          filters:
            - JwtAuth
        
        # Rules Service
        - id: rules-service
          uri: ${rules-service.url:http://rules-service:8081}
          predicates:
            - Path=/internal/fees/**, /internal/check-velocity, /internal/limits/**, /internal/transactions/quote, /internal/audit-logs
          filters:
            - RewritePath=/internal/(?<segment>.*), /internal/${segment}
        
        # Ledger Service
        - id: ledger-service
          uri: ${ledger-service.url:http://ledger-service:8082}
          predicates:
            - Path=/internal/debit, /internal/credit, /internal/balance/**, /internal/reverse/**, /internal/audit-logs
          filters:
            - RewritePath=/internal/(?<segment>.*), /internal/${segment}
        
        # Onboarding Service
        - id: onboarding-service
          uri: ${onboarding-service.url:http://onboarding-service:8083}
          predicates:
            - Path=/internal/verify-mykad, /internal/biometric, /internal/kyc/review-queue, /internal/compliance/status, /internal/audit-logs
          filters:
            - RewritePath=/internal/(?<segment>.*), /internal/${segment}
        
        # Switch Adapter Service
        - id: switch-adapter-service
          uri: ${switch-service.url:http://switch-adapter-service:8084}
          predicates:
            - Path=/internal/auth, /internal/reversal, /internal/duitnow, /internal/balance-inquiry, /internal/audit-logs
          filters:
            - RewritePath=/internal/(?<segment>.*), /internal/${segment}
        
        # Biller Service
        - id: biller-service
          uri: ${biller-service.url:http://biller-service:8085}
          predicates:
            - Path=/internal/validate-ref, /internal/pay-bill, /internal/topup, /internal/transfer/proxy/enquiry, /internal/audit-logs
          filters:
            - RewritePath=/internal/(?<segment>.*), /internal/${segment}

        # External Transaction Quote route - MUST be BEFORE /transactions route
        - id: external-transactions-quote
          uri: ${rules-service.url:http://rules-service:8081}
          predicates:
            - Path=/api/v1/transactions/quote
          filters:
            - JwtAuth
            - RewritePath=/api/v1/transactions/quote, /internal/transactions/quote
          
        # External Transaction Orchestrator routes (Temporal SAGA) - MUST be after quote route
        - id: external-transactions-start
          uri: ${orchestrator-service.url:http://orchestrator-service:8086}
          predicates:
            - Path=/api/v1/transactions
          filters:
            - JwtAuth
            - RequestTransform=orchestrator
            - RewritePath=/api/v1/transactions, /api/v1/transactions

        - id: external-transactions-status
          uri: ${orchestrator-service.url:http://orchestrator-service:8086}
          predicates:
            - Path=/api/v1/transactions/*/status
          filters:
            - JwtAuth
            - RewritePath=/api/v1/transactions/(?<workflowId>.*)/status, /api/v1/transactions/${workflowId}/status

        - id: external-transactions-force-resolve
          uri: ${orchestrator-service.url:http://orchestrator-service:8086}
          predicates:
            - Path=/api/v1/transactions/*/force-resolve
          filters:
            - JwtAuth
            - RewritePath=/api/v1/transactions/(?<workflowId>.*)/force-resolve, /api/v1/transactions/${workflowId}/force-resolve

        # Backoffice transactions - MUST be BEFORE orchestrator-backoffice-resolution
        - id: backoffice-ledger-transactions
          uri: ${ledger-service.url:http://ledger-service:8082}
          predicates:
            - Path=/api/v1/backoffice/ledger-transactions
          filters:
            - JwtAuth
            - RewritePath=/api/v1/backoffice/ledger-transactions[/]?, /internal/backoffice/ledger-transactions
          metadata:
            route-order: 1

        # Orchestrator Backoffice Resolution routes - specific paths without rewrite
        - id: orchestrator-backoffice-resolution
          uri: ${orchestrator-service.url:http://orchestrator-service:8086}
          predicates:
            - Path=/api/v1/backoffice/transactions/{workflowId}/create-case
          filters:
            - JwtAuth
          metadata:
            route-order: 10

        - id: orchestrator-backoffice-resolution-maker
          uri: ${orchestrator-service.url:http://orchestrator-service:8086}
          predicates:
            - Path=/api/v1/backoffice/transactions/{workflowId}/maker-propose
          filters:
            - JwtAuth
          metadata:
            route-order: 10

        - id: orchestrator-backoffice-resolution-checker
          uri: ${orchestrator-service.url:http://orchestrator-service:8086}
          predicates:
            - Path=/api/v1/backoffice/transactions/{workflowId}/checker-approve,/api/v1/backoffice/transactions/{workflowId}/checker-reject
          filters:
            - JwtAuth
          metadata:
            route-order: 10

        - id: orchestrator-backoffice-resolution-details
          uri: ${orchestrator-service.url:http://orchestrator-service:8086}
          predicates:
            - Path=/api/v1/backoffice/transactions/{workflowId}/execution-details
          filters:
            - JwtAuth
          metadata:
            route-order: 10

        - id: orchestrator-backoffice-resolution-force
          uri: ${orchestrator-service.url:http://orchestrator-service:8086}
          predicates:
            - Path=/api/v1/backoffice/transactions/{workflowId}/force-resolve
          filters:
            - JwtAuth
          metadata:
            route-order: 10

        # List all workflows - with rewrite
        - id: orchestrator-backoffice-list
          uri: ${orchestrator-service.url:http://orchestrator-service:8086}
          predicates:
            - Path=/api/v1/backoffice/transactions/workflows
          filters:
            - JwtAuth
          metadata:
            route-order: 20

        - id: orchestrator-backoffice-resolutions
          uri: ${orchestrator-service.url:http://orchestrator-service:8086}
          predicates:
            - Path=/api/v1/backoffice/transactions
          filters:
            - JwtAuth
            - RewritePath=/api/v1/backoffice/transactions/(?<segment>.*), /api/v1/backoffice/transactions/${segment}
          metadata:
            route-order: 30

        # Orchestrator internal endpoints (including audit-logs)
        - id: orchestrator-internal
          uri: ${orchestrator-service.url:http://orchestrator-service:8086}
          predicates:
            - Path=/internal/audit-logs
          filters:
            - RewritePath=/internal/(?<segment>.*), /internal/${segment}

        # External Compliance Status route
        - id: external-compliance-status
          uri: ${onboarding-service.url:http://onboarding-service:8083}
          predicates:
            - Path=/api/v1/compliance/status
          filters:
            - JwtAuth
            - RewritePath=/api/v1/compliance/status, /internal/compliance/status

        # ============================================================
        # NEW: External Domain Endpoints (Aligned with OpenAPI)
        # ============================================================
        - id: external-biller-proxy-enquiry
          uri: ${biller-service.url:http://biller-service:8085}
          predicates:
            - Path=/api/v1/transfer/proxy/enquiry
          filters:
            - JwtAuth
            - RewritePath=/api/v1/transfer/proxy/enquiry, /internal/transfer/proxy/enquiry

        - id: external-switch-balance-inquiry
          uri: ${switch-service.url:http://switch-adapter-service:8084}
          predicates:
            - Path=/api/v1/balance-inquiry
          filters:
            - JwtAuth
            - RewritePath=/api/v1/balance-inquiry, /internal/balance-inquiry

        - id: external-rules-fees
          uri: ${rules-service.url:http://rules-service:8081}
          predicates:
            - Path=/api/v1/rules/fees
          filters:
            - JwtAuth
            - RewritePath=/api/v1/rules/fees, /internal/fees

        - id: external-onboarding-verify-mykad
          uri: ${onboarding-service.url:http://onboarding-service:8083}
          predicates:
            - Path=/api/v1/onboarding/verify-mykad
          filters:
            - JwtAuth
            - RewritePath=/api/v1/onboarding/verify-mykad, /internal/verify-mykad


        - id: external-onboarding-submit-application
          uri: ${onboarding-service.url:http://onboarding-service:8083}
          predicates:
            - Path=/api/v1/onboarding/submit-application
          filters:
            - JwtAuth
            - RewritePath=/api/v1/onboarding/submit-application, /internal/onboarding/application

        - id: external-ledger-agent-balance
          uri: ${ledger-service.url:http://ledger-service:8082}
          predicates:
            - Path=/api/v1/agent/balance
          filters:
            - JwtAuth
            - RewritePath=/api/v1/agent/balance, /internal/balance

        - id: external-onboarding-kyc-biometric
          uri: ${onboarding-service.url:http://onboarding-service:8083}
          predicates:
            - Path=/api/v1/kyc/biometric
          filters:
            - JwtAuth
            - RewritePath=/api/v1/kyc/biometric, /internal/biometric

        # Backoffice routes - Note: /transactions must come BEFORE /float for routing to work correctly
        - id: backoffice-agent-float-transactions
          uri: ${ledger-service.url:http://ledger-service:8082}
          predicates:
            - Path=/api/v1/backoffice/agents/{agentId}/float/transactions
          filters:
            - JwtAuth
            - SetPath=/internal/backoffice/float/{agentId}/float/transactions

        - id: backoffice-agent-float
          uri: ${ledger-service.url:http://ledger-service:8082}
          predicates:
            - Path=/api/v1/backoffice/agents/{agentId}/float
          filters:
            - JwtAuth
            - SetPath=/internal/backoffice/float/{agentId}

        - id: backoffice-agents-list
          uri: ${onboarding-service.url:http://onboarding-service:8083}
          predicates:
            - Path=/api/v1/backoffice/agents
          filters:
            - JwtAuth
            - RewritePath=/api/v1/backoffice/agents, /backoffice/agents

        - id: backoffice-agents-detail
          uri: ${onboarding-service.url:http://onboarding-service:8083}
          predicates:
            - Path=/api/v1/backoffice/agents/{id}
          filters:
            - JwtAuth
            - RewritePath=/api/v1/backoffice/agents/(?<segment>.*), /backoffice/agents/${segment}

        - id: backoffice-dashboard
          uri: ${ledger-service.url:http://ledger-service:8082}
          predicates:
            - Path=/api/v1/backoffice/dashboard
          filters:
            - JwtAuth
            - RewritePath=/api/v1/backoffice/dashboard, /internal/backoffice/dashboard

        - id: backoffice-settlement-export
          uri: ${ledger-service.url:http://ledger-service:8082}
          predicates:
            - Path=/api/v1/backoffice/settlement/export
          filters:
            - JwtAuth
            - RewritePath=/api/v1/backoffice/settlement/export, /internal/backoffice/settlement/export

        - id: backoffice-settlement
          uri: ${ledger-service.url:http://ledger-service:8082}
          predicates:
            - Path=/api/v1/backoffice/settlement
          filters:
            - JwtAuth
            - RewritePath=/api/v1/backoffice/settlement, /internal/backoffice/settlement

        - id: backoffice-kyc-review
          uri: ${onboarding-service.url:http://onboarding-service:8083}
          predicates:
            - Path=/api/v1/backoffice/kyc/review-queue
          filters:
            - JwtAuth
            - RewritePath=/api/v1/backoffice/kyc/review-queue, /internal/kyc/review-queue

        - id: backoffice-discrepancy-maker
          uri: ${ledger-service.url:http://ledger-service:8082}
          predicates:
            - Path=/api/v1/backoffice/discrepancy/*/maker-action
          filters:
            - JwtAuth
            - RewritePath=/api/v1/backoffice/discrepancy/(?<caseId>.*)/maker-action, /internal/reconciliation/discrepancy/maker-propose

        - id: backoffice-discrepancy-checker-approve
          uri: ${ledger-service.url:http://ledger-service:8082}
          predicates:
            - Path=/api/v1/backoffice/discrepancy/*/checker-approve
          filters:
            - JwtAuth
            - RewritePath=/api/v1/backoffice/discrepancy/(?<caseId>.*)/checker-approve, /internal/reconciliation/discrepancy/checker-approve

        - id: backoffice-discrepancy-checker-reject
          uri: ${ledger-service.url:http://ledger-service:8082}
          predicates:
            - Path=/api/v1/backoffice/discrepancy/*/checker-reject
          filters:
            - JwtAuth
            - RewritePath=/api/v1/backoffice/discrepancy/(?<caseId>.*)/checker-reject, /internal/reconciliation/discrepancy/checker-reject

        - id: backoffice-audit-logs
          uri: ${auth-service.url:http://auth-iam-service:8087}
          predicates:
            - Path=/api/v1/backoffice/audit-logs
          filters:
            - JwtAuth
            - RewritePath=/api/v1/backoffice/audit-logs, /auth/audit/logs
        
        # Admin routes (User Management, Roles) - now pointing to auth-iam-service
        - id: admin-users-list
          uri: ${auth-service.url:http://auth-iam-service:8087}
          predicates:
            - Path=/api/v1/backoffice/admin/users
          filters:
            - JwtAuth
            - RewritePath=/api/v1/backoffice/admin/users, /auth/users
        
        - id: admin-users-detail
          uri: ${auth-service.url:http://auth-iam-service:8087}
          predicates:
            - Path=/api/v1/backoffice/admin/users/*
          filters:
            - JwtAuth
            - RewritePath=/api/v1/backoffice/admin/users/(?<segment>.*), /auth/users/${segment}
        
        - id: admin-users-lock
          uri: ${auth-service.url:http://auth-iam-service:8087}
          predicates:
            - Path=/api/v1/backoffice/admin/users/*/lock
          filters:
            - JwtAuth
            - RewritePath=/api/v1/backoffice/admin/users/(?<segment>.*)/lock, /auth/users/${segment}/lock
        
        - id: admin-users-unlock
          uri: ${auth-service.url:http://auth-iam-service:8087}
          predicates:
            - Path=/api/v1/backoffice/admin/users/*/unlock
          filters:
            - JwtAuth
            - RewritePath=/api/v1/backoffice/admin/users/(?<segment>.*)/unlock, /auth/users/${segment}/unlock
        
        - id: admin-users-reset-password
          uri: ${auth-service.url:http://auth-iam-service:8087}
          predicates:
            - Path=/api/v1/backoffice/admin/users/*/reset-password
          filters:
            - JwtAuth
            - RewritePath=/api/v1/backoffice/admin/users/(?<segment>.*)/reset-password, /auth/users/${segment}/reset-password
        
        - id: admin-roles
          uri: ${auth-service.url:http://auth-iam-service:8087}
          predicates:
            - Path=/api/v1/backoffice/admin/roles
          filters:
            - JwtAuth
            - RewritePath=/api/v1/backoffice/admin/roles, /auth/roles
        
        # API Docs proxy routes
        - id: docs-auth
          uri: ${auth-service.url:http://auth-iam-service:8087}
          predicates:
            - Path=/docs/auth/**
          filters:
            - RewritePath=/docs/auth/(?<segment>.*), /${segment}
        
        - id: docs-rules
          uri: ${rules-service.url:http://rules-service:8081}
          predicates:
            - Path=/docs/rules/**
          filters:
            - RewritePath=/docs/rules/(?<segment>.*), /${segment}
        
        - id: docs-ledger
          uri: ${ledger-service.url:http://ledger-service:8082}
          predicates:
            - Path=/docs/ledger/**
          filters:
            - RewritePath=/docs/ledger/(?<segment>.*), /${segment}
        
        - id: docs-onboarding
          uri: ${onboarding-service.url:http://onboarding-service:8083}
          predicates:
            - Path=/docs/onboarding/**
          filters:
            - RewritePath=/docs/onboarding/(?<segment>.*), /${segment}
        
        - id: docs-switch
          uri: ${switch-service.url:http://switch-adapter-service:8084}
          predicates:
            - Path=/docs/switch/**
          filters:
            - RewritePath=/docs/switch/(?<segment>.*), /${segment}
        
        - id: docs-biller
          uri: ${biller-service.url:http://biller-service:8085}
          predicates:
            - Path=/docs/biller/**
          filters:
            - RewritePath=/docs/biller/(?<segment>.*), /${segment}

        - id: docs-orchestrator
          uri: ${orchestrator-service.url:http://orchestrator-service:8086}
          predicates:
            - Path=/docs/orchestrator/**
          filters:
            - RewritePath=/docs/orchestrator/(?<segment>.*), /${segment}

        # Admin - Health (aggregate all) - handled by gateway directly
        - id: admin-health-all
          uri: ${gateway-service.url:http://gateway:8080}
          predicates:
            - Path=/api/v1/admin/health/all
          filters:
            - JwtAuth
            - RewritePath=/api/v1/admin/health/all, /admin/health/all

        # Admin - Health (individual service)
        - id: admin-health-service
          uri: ${gateway-service.url:http://gateway:8080}
          predicates:
            - Path=/api/v1/admin/health/{service}
          filters:
            - JwtAuth
            - ServiceRoute

        # Admin - Metrics - use ServiceRoute filter to proxy to service actuator
        - id: admin-metrics
          uri: ${gateway-service.url:http://gateway:8080}
          predicates:
            - Path=/api/v1/admin/metrics/{service}
          filters:
            - JwtAuth
            - ServiceRoute

        # Admin - Audit Logs - route to service based on ?service= query param
        - id: admin-audit-logs
          uri: ${gateway-service.url:http://gateway:8080}
          predicates:
            - Path=/api/v1/admin/audit-logs
          filters:
            - JwtAuth
            - RequestHeaderSize=100KB
            - ServiceRouteAudit

        # Admin - Audit Logs Export
        - id: admin-audit-logs-export
          uri: ${gateway-service.url:http://gateway:8080}
          predicates:
            - Path=/api/v1/admin/audit-logs/export
          filters:
            - JwtAuth
            - ServiceRouteAudit

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.agentbanking.gateway: DEBUG
    org.springframework.cloud.gateway: DEBUG
    org.springframework.security: DEBUG
    org.springframework.security.oauth2: DEBUG
    org.springframework.security.oauth2.jwt: DEBUG
    reactor.netty: DEBUG
    io.grpc: DEBUG